; PlatformIO Project Configuration File — PicoGPU Coprocessor Firmware
; RP2350 primary target. Phase 0 + Phase 1 build.
; See Technical-Implementation-Plan.md §4.1 for full config rationale.

[env:rp2350_fast]
platform     = https://github.com/maxgerhardt/platform-raspberrypi.git
board        = rpipico2
framework    = picosdk
lib_ldf_mode = deep+
lib_deps     =
    symlink://C:/Users/misapw/Documents/gits/picoGPU/pico_hdmi

; Invoke pioasm on any .pio files in src/ and library dirs.
; platform-raspberrypi already bundles the pioasm tool; this script wires it
; into the build process so .pio files are compiled to .pio.h headers.
extra_scripts = pre:../platform-raspberrypi/builder/frameworks/_build_pioasm.py

; NOTE: do NOT add -DVIDEO_MODE_1280x720 or similar — that bakes in a single
; compile-time mode. We select video modes at runtime (spec §3.2, TIP §4.1).
build_flags =
    -Iinclude
    -Isrc
    -DPICO_HDMI_RUNTIME_MODES
    -DFEATURE_TARGET_RP2350=1
    -DCPU_SPEED_FAST=1
    -DFEATURE_RGB565=1
    -DFEATURE_FPU_PRIMITIVES=1
    -DFEATURE_CAPTURE_REGION=1
    -DFEATURE_ARBITRARY_ROTATION=0
    -DFEATURE_VECTOR_FONTS=0
    -DFEATURE_DITHERING=1
    -DFEATURE_PAWN_VM=0
    -DFEATURE_PAWN_FLOAT=0
    -DFEATURE_VM_PARALLEL_CORE1=0
    -DFEATURE_VM_COOPERATIVE=0
    -DFEATURE_BEGIN_END_FRAME=1
    -DFEATURE_FRAME_STATS=1
    -DFEATURE_EVENT_BUFFER=1
    -DFEATURE_DISPLAY_LIST=1
    -DFEATURE_NAMED_VRAM=1
    -DFEATURE_DEFERRED_DRAW=1
    -DFEATURE_ST7796_COMPAT=0
    -DFEATURE_INT_PIN=0
    -DFEATURE_CORE1_RASTERIZER=0
    -DFEATURE_IMAGE_ORDER_RENDER=0
    -DFEATURE_3D_OFFLOAD=0

board_upload.flash_size   = 16MB
board_upload.maximum_size = 16777216